services:
  db:
    image: mysql:8.0
    container_name: fastfood-invoice-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_pass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastfood-invoice-app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8000:80"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://drshawarma.me}
      SESSION_SECURE_COOKIE: "true"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: fastfood-invoice-tunnel
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro

volumes:
  db_data:
    name: fastfood-invoice-system_db_data
    external: true